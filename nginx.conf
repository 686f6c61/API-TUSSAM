server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;
    etag on;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_vary on;
    gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=()" always;

    # Sonda de salud para el healthcheck del contenedor y de Coolify.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # El HTML no se cachea agresivamente: así los cambios se ven al desplegar.
    location ~* \.html$ {
        expires -1;
    }

    # Imagen social y datos del mapa: cambian poco, cache moderada.
    location = /og-tussam.png {
        expires 1d;
    }

    location ~* /(paradas|lineas)\.json$ {
        expires 1d;
    }

    location = /robots.txt {
        expires 1h;
    }

    location = /sitemap.xml {
        expires 1h;
    }

    # Estáticos con hash de contenido implícito: cache larga.
    location ~* \.(?:css|js|png|svg|ico)$ {
        expires 7d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
