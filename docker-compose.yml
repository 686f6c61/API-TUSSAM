services:
  tussam:
    build: .
    container_name: tussam-api
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
    environment:
      - APP_ENV=${APP_ENV:-development}
      - ENABLE_DOCS=${ENABLE_DOCS:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - SYNC_ENABLED=true
      - SYNC_DAY=sun
      - SYNC_HOUR=4
      - SYNC_MINUTE=0
      - SYNC_API_KEY=${SYNC_API_KEY:?Define SYNC_API_KEY antes de arrancar docker compose}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  smoke:
    image: nginx:1.27-alpine
    profiles: ["smoke"]
    container_name: tussam-smoke
    ports:
      - "8082:80"
    volumes:
      - ./examples/smoke-app:/usr/share/nginx/html:ro
    depends_on:
      tussam:
        condition: service_healthy
    restart: unless-stopped
