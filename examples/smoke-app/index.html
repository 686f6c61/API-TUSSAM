<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TUSSAM API Smoke Test</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Cpath fill='white' d='M18 18h28a6 6 0 0 1 6 6v19a5 5 0 0 1-5 5h-1a5 5 0 0 1-10 0h-8a5 5 0 0 1-10 0h-1a5 5 0 0 1-5-5V24a6 6 0 0 1 6-6Zm2 8v10h24V26H20Zm4 25a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm18 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5c6575;
      --line: #d9dfeb;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --soft: #edf2f7;
      --code: #101827;
      --code-text: #e6edf7;
      --warn: #8a4b0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 1.55rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .status {
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 390px) 1fr;
      gap: 18px;
      align-items: start;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 3px solid #b8e0dc;
      outline-offset: 1px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      background: var(--soft);
      color: var(--ink);
    }

    button.secondary:hover {
      background: #dfe7f0;
    }

    pre {
      min-height: 520px;
      max-height: 72vh;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border-radius: 8px;
      background: var(--code);
      color: var(--code-text);
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .source {
      margin-top: 12px;
      color: var(--warn);
      font-size: 0.82rem;
    }

    @media (max-width: 860px) {
      main {
        padding: 18px;
      }

      header {
        display: block;
      }

      .status {
        min-width: 0;
        margin-top: 14px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .row,
      .secondary-actions {
        grid-template-columns: 1fr;
      }

      pre {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>TUSSAM API Smoke Test</h1>
        <p>Docker local en <code>localhost:8081</code>, geocoding con OpenStreetMap.</p>
      </div>
      <div class="status" id="status">Sin petición todavía</div>
    </header>

    <div class="layout">
      <section>
        <h2>Input</h2>

        <label>API base
          <input id="baseUrl" value="http://localhost:8081" autocomplete="off">
        </label>

        <div class="row">
          <label>Calle
            <input id="street" value="Calle Recaredo" autocomplete="street-address">
          </label>
          <label>Número
            <input id="number" value="6-7" autocomplete="address-line2">
          </label>
        </div>

        <div class="row">
          <label>Código postal
            <input id="postalCode" value="41003" inputmode="numeric" autocomplete="postal-code">
          </label>
          <label>Parada
            <input id="codigo" value="43" autocomplete="off">
          </label>
        </div>

        <div class="row">
          <label>Latitud
            <input id="lat" value="37.389793" inputmode="decimal" autocomplete="off">
          </label>
          <label>Longitud
            <input id="lon" value="-5.984356" inputmode="decimal" autocomplete="off">
          </label>
        </div>

        <div class="row">
          <label>Radio
            <input id="radio" type="number" min="50" max="2000" value="500">
          </label>
          <label>Máx. paradas
            <input id="maxParadas" type="number" min="1" max="10" value="3">
          </label>
        </div>

        <label>Endpoint
          <select id="endpoint">
            <option value="health">GET /health</option>
            <option value="nearby">GET /paradas/cercanas</option>
            <option value="nearbyTimes" selected>GET /cercanas</option>
            <option value="times">GET /paradas/{codigo}/tiempos</option>
          </select>
        </label>

        <label>Device ID
          <input id="deviceId" value="smoke-test-local" autocomplete="off">
        </label>

        <div class="actions">
          <button id="geocodeRun">Geocodificar y probar</button>
          <div class="secondary-actions">
            <button class="secondary" id="run">Ejecutar endpoint</button>
            <button class="secondary" id="clear">Limpiar salida</button>
          </div>
        </div>

        <p class="source">Geocoding: OpenStreetMap Nominatim.</p>
      </section>

      <section>
        <h2>Output</h2>
        <pre id="output">Pulsa Geocodificar y probar para consultar la API.</pre>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const NOMINATIM_URL = "https://nominatim.openstreetmap.org/search";

    function applyQueryParams() {
      const params = new URLSearchParams(window.location.search);
      if (params.has("api")) {
        $("baseUrl").value = params.get("api");
      }
    }

    function setStatus(message) {
      $("status").textContent = message;
    }

    function prettyJson(text) {
      try {
        return JSON.stringify(JSON.parse(text), null, 2);
      } catch (_) {
        return text;
      }
    }

    function endpointUrl(endpoint = $("endpoint").value) {
      const base = $("baseUrl").value.replace(/\/$/, "");
      const lat = encodeURIComponent($("lat").value.trim());
      const lon = encodeURIComponent($("lon").value.trim());
      const radio = encodeURIComponent($("radio").value.trim());
      const max = encodeURIComponent($("maxParadas").value.trim());
      const codigo = encodeURIComponent($("codigo").value.trim());

      switch (endpoint) {
        case "health":
          return `${base}/health`;
        case "nearby":
          return `${base}/paradas/cercanas?lat=${lat}&lon=${lon}&radio=${radio}`;
        case "times":
          return `${base}/paradas/${codigo}/tiempos`;
        default:
          return `${base}/cercanas?lat=${lat}&lon=${lon}&radio=${radio}&max_paradas=${max}`;
      }
    }

    function deviceHeaders() {
      return {
        "Accept": "application/json",
        "X-Device-ID": $("deviceId").value.trim() || "smoke-test-local",
      };
    }

    async function geocodeAddress() {
      const street = $("street").value.trim();
      const number = $("number").value.trim();
      const postalCode = $("postalCode").value.trim();

      if (!street || !postalCode) {
        throw new Error("Calle y código postal son obligatorios para geocodificar.");
      }

      const params = new URLSearchParams({
        format: "jsonv2",
        addressdetails: "1",
        limit: "1",
        street: [street, number].filter(Boolean).join(" "),
        postalcode: postalCode,
        city: "Sevilla",
        country: "Spain",
        "accept-language": "es",
      });

      const url = `${NOMINATIM_URL}?${params}`;
      const response = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!response.ok) {
        throw new Error(`Nominatim respondió ${response.status} ${response.statusText}`);
      }

      const results = await response.json();
      if (!Array.isArray(results) || results.length === 0) {
        throw new Error("No se encontraron coordenadas para esa dirección.");
      }

      const place = results[0];
      $("lat").value = Number(place.lat).toFixed(6);
      $("lon").value = Number(place.lon).toFixed(6);

      return {
        request: url,
        display_name: place.display_name,
        lat: Number(place.lat),
        lon: Number(place.lon),
        osm_type: place.osm_type,
        osm_id: place.osm_id,
      };
    }

    async function runEndpoint(endpoint = $("endpoint").value, prefix = "") {
      const url = endpointUrl(endpoint);
      setStatus("Consultando API...");
      $("output").textContent = `${prefix}GET ${url}\n\n`;
      const started = performance.now();

      const response = await fetch(url, { headers: deviceHeaders() });
      const elapsed = Math.round(performance.now() - started);
      const text = await response.text();
      const body = prettyJson(text);

      setStatus(`${response.status} ${response.statusText} · ${elapsed} ms`);
      $("output").textContent =
        `${prefix}GET ${url}\n` +
        `Status: ${response.status} ${response.statusText}\n` +
        `X-RateLimit-Remaining: ${response.headers.get("X-RateLimit-Remaining") ?? "n/a"}\n\n` +
        body;
    }

    async function geocodeAndRun() {
      setStatus("Geocodificando...");
      $("output").textContent = "GEOCODE OpenStreetMap Nominatim\n\n";

      try {
        const place = await geocodeAddress();
        const prefix =
          `GEOCODE ${place.request}\n` +
          `${JSON.stringify({
            display_name: place.display_name,
            lat: place.lat,
            lon: place.lon,
            osm_type: place.osm_type,
            osm_id: place.osm_id,
          }, null, 2)}\n\n`;
        $("endpoint").value = "nearbyTimes";
        await runEndpoint("nearbyTimes", prefix);
      } catch (error) {
        setStatus("Error");
        $("output").textContent = String(error);
      }
    }

    async function runSelectedEndpoint() {
      try {
        await runEndpoint();
      } catch (error) {
        setStatus("Error");
        $("output").textContent = String(error);
      }
    }

    $("geocodeRun").addEventListener("click", geocodeAndRun);
    $("run").addEventListener("click", runSelectedEndpoint);
    $("clear").addEventListener("click", () => {
      $("output").textContent = "Salida limpia.";
      setStatus("Sin petición todavía");
    });

    applyQueryParams();
    runEndpoint("health").catch((error) => {
      setStatus("API no disponible");
      $("output").textContent = String(error);
    });
  </script>
</body>
</html>
